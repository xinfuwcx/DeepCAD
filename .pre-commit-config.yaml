repos:
  # General file quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements
      - id: mixed-line-ending

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: ["--line-length", "100"]
        exclude: '^(kratos_source/|frontend/)'

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]
        exclude: '^(kratos_source/|frontend/)'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: ["--line-length", "100", "--fix"]
        exclude: '^(kratos_source/|frontend/)'

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        exclude: '^(kratos_source/|frontend/|tests/)'
        additional_dependencies:
          - types-requests
          - types-setuptools
        args: ["--ignore-missing-imports", "--scripts-are-modules"]

  # Security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        exclude: '^(kratos_source/|frontend/|tests/)'
        args: ["-c", ".bandit", "-r", "."]

  # Frontend linting and formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '^frontend/.*\.(ts|tsx|js|jsx|css|scss|json|md)$'
        exclude: 'frontend/dist/'

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: '^frontend/.*\.(ts|tsx|js|jsx)$'
        exclude: 'frontend/dist/'
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/eslint-plugin@6.19.1'
          - '@typescript-eslint/parser@6.19.1'

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: ["--ignore", "DL3008", "--ignore", "DL3009"]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.ya?ml$'
        exclude: '^(kratos_source/|frontend/node_modules/)'

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: '^(poetry\.lock|frontend/pnpm-lock\.yaml|\.pre-commit-config\.yaml)$'

# Configuration
default_language_version:
  python: python3.10
  node: '18'

exclude: '^(kratos_source/|\.venv/|node_modules/|frontend/node_modules/|frontend/dist/)' 